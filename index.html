<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fucked by dark</title>
  <style>
    /* Font settings */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      background-color: #000;
      overflow: hidden;
    }

    /* Video Background Container */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .video-background iframe {
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: none;
      filter: contrast(1.1) brightness(0.9);
    }

    /* Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.5);
      z-index: 1;
    }

    /* Main Content Container */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Main Title */
    h1 {
      font-size: 4.5rem;
      text-transform: uppercase;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow: 0 0 10px #ffffff, 0 0 20px #a9a9a9;
      margin-bottom: 60px;
      text-align: center;
      animation: glow 2.5s infinite alternate;
    }

    /* Cards Container */
    .cards-container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Card Design */
    .card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px 30px;
      width: 250px;
      text-align: center;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: #ffffff;
      box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #ffffff;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      object-fit: cover;
      background-color: #333;
    }

    .card h2 {
      margin: 0;
      font-size: 2rem;
      color: #ffffff;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }

    .card p {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #b0b0b0;
      font-weight: 500;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #ffffff, 0 0 15px #a9a9a9, 0 0 20px #808080;
      }

      to {
        text-shadow: 0 0 15px #ffffff, 0 0 25px #a9a9a9, 0 0 35px #808080;
      }
    }
  </style>
</head>

<body>

  <div class="video-background">
    <iframe src="https://streamable.com/e/gsr485?autoplay=1&muted=0&nocontrols=1&loop=1" allow="autoplay; fullscreen"
      allowfullscreen></iframe>
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1>fucked by dark</h1>

    <div class="cards-container">

      <div class="card">
        <img src="img1.jpg" alt="DARK Avatar" class="avatar">
        <h2>DARK</h2>
      </div>

      

    </div>
  </div>

</body>

</html>
